<svg width="600" height="150" viewBox="0 0 600 150" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Logo Gradient (Purple to Rose) -->
    <linearGradient id="logoRefined" x1="50" y1="0" x2="50" y2="100" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stopColor="#9333ea" />
      <stop offset="100%" stopColor="#e11d48" />
    </linearGradient>
    
    <!-- Text Gradient for STUDIO -->
    <linearGradient id="textRefined" x1="0%" y1="0%" x2="100%" y2="0%">
        <stop offset="0%" stopColor="#a855f7" />
        <stop offset="100%" stopColor="#f43f5e" />
    </linearGradient>
    
    <!-- Glow Filter -->
    <filter id="glowRefined" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3" result="coloredBlur" />
      <feMerge>
        <feMergeNode in="coloredBlur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>

    <style>
      @import url('https://fonts.googleapis.com/css2?family=Inter:wght@900&amp;display=swap');
      .text-title { font-family: 'Inter', sans-serif; font-weight: 900; }
    </style>
  </defs>

  <!-- Transparent Background -->

  <!-- Content Container: Centered Vertically -->
  <g transform="translate(50, 25)">
    
    <!-- Logo (Left) Size ~100x100 -->
    <g transform="translate(0, 0)">
        <g filter="url(#glowRefined)">
            <!-- Circle -->
            <circle cx="50" cy="50" r="45" stroke="url(#logoRefined)" stroke-width="4" stroke-linecap="round" fill="none" opacity="0.9" />
            <!-- Ellipses -->
            <ellipse cx="50" cy="50" rx="40" ry="14" stroke="url(#logoRefined)" stroke-width="4" stroke-linecap="round" fill="none" transform="rotate(0 50 50)" opacity="0.8" />
            <ellipse cx="50" cy="50" rx="40" ry="14" stroke="url(#logoRefined)" stroke-width="4" stroke-linecap="round" fill="none" transform="rotate(60 50 50)" opacity="0.8" />
            <ellipse cx="50" cy="50" rx="40" ry="14" stroke="url(#logoRefined)" stroke-width="4" stroke-linecap="round" fill="none" transform="rotate(120 50 50)" opacity="0.8" />
        </g>
    </g>

    <!-- Text (Right) -->
    <g transform="translate(120, 20)">
        <!-- ETHEREAL -->
        <!-- Using inline font-family as backup -->
        <text x="0" y="40" font-family="'Inter', sans-serif" font-weight="900" font-size="48" letter-spacing="0.2em" fill="#ffffff">ETHEREAL</text>
        
        <!-- STUDIO -->
        <text x="2" y="75" font-family="'Inter', sans-serif" font-weight="900" font-size="24" letter-spacing="0.4em" fill="url(#textRefined)">STUDIO</text>
    </g>
    
  </g>
</svg>
