<svg width="800" height="300" viewBox="0 0 800 300" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Logo Gradient -->
    <linearGradient id="logoGrad" x1="50" y1="0" x2="50" y2="100" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stopColor="#9333ea" />
      <stop offset="100%" stopColor="#e11d48" />
    </linearGradient>
    
    <!-- Text Gradient for STUDIO -->
    <linearGradient id="textGrad" x1="0%" y1="0%" x2="100%" y2="0%">
        <stop offset="0%" stopColor="#a855f7" />
        <stop offset="100%" stopColor="#f43f5e" />
    </linearGradient>
    
    <!-- Glow Filter -->
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="4" result="coloredBlur" />
      <feMerge>
        <feMergeNode in="coloredBlur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>

    <style>
      @import url('https://fonts.googleapis.com/css2?family=Inter:wght@700;900&amp;display=swap');
    </style>
  </defs>

  <!-- Background -->
  <rect width="800" height="300" fill="#090a10" rx="12" />

  <!-- Container for centering -->
  <g transform="translate(400, 150)">
    
    <!-- Logo Section (Left) -->
    <!-- Translating back by half width to center the whole group -->
    <!-- Logo is approx 100 wide. Text is approx 300 wide. Total 400ish. -->
    <!-- Let's visually center it. -->
    
    <g transform="translate(-180, -60)">
        <!-- Logo Icon (Scaled 1.2x) -->
        <g transform="scale(1.2)">
            <g filter="url(#glow)">
                <circle cx="50" cy="50" r="45" stroke="url(#logoGrad)" stroke-width="3" stroke-linecap="round" opacity="0.9" />
                <ellipse cx="50" cy="50" rx="40" ry="14" stroke="url(#logoGrad)" stroke-width="3" stroke-linecap="round" transform="rotate(0 50 50)" opacity="0.8" />
                <ellipse cx="50" cy="50" rx="40" ry="14" stroke="url(#logoGrad)" stroke-width="3" stroke-linecap="round" transform="rotate(60 50 50)" opacity="0.8" />
                <ellipse cx="50" cy="50" rx="40" ry="14" stroke="url(#logoGrad)" stroke-width="3" stroke-linecap="round" transform="rotate(120 50 50)" opacity="0.8" />
            </g>
        </g>
    </g>

    <!-- Text Section (Right of Logo) -->
    <g transform="translate(-40, -10)">
        <!-- ETHEREAL -->
        <text x="0" y="0" font-family="'Inter', sans-serif" font-weight="900" font-size="52" letter-spacing="0.25em" fill="white" dominant-baseline="middle">ETHEREAL</text>
        
        <!-- STUDIO -->
        <text x="0" y="55" font-family="'Inter', sans-serif" font-weight="700" font-size="28" letter-spacing="0.5em" fill="url(#textGrad)" dominant-baseline="middle">STUDIO</text>
    </g>
    
  </g>
</svg>
