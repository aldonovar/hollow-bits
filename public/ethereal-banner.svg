<svg width="800" height="250" viewBox="0 0 800 250" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Logo Gradient: Matching AppLogo.tsx exactly -->
    <!-- from #9333ea (Purple 600) to #e11d48 (Rose 600) -->
    <linearGradient id="logoExact" x1="50" y1="0" x2="50" y2="100" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#9333ea" /> 
      <stop offset="100%" stop-color="#e11d48" />
    </linearGradient>

    <!-- Text Gradient for STUDIO: Matching Transport.tsx classes (daw-violet to daw-ruby) -->
    <!-- #a855f7 to #f43f5e -->
    <linearGradient id="textExact" x1="0%" y1="0%" x2="100%" y2="0%">
        <stop offset="0%" stop-color="#a855f7" />
        <stop offset="100%" stop-color="#f43f5e" />
    </linearGradient>

    <!-- Star Glow -->
    <filter id="starGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="0.8" result="coloredBlur" />
      <feMerge>
        <feMergeNode in="coloredBlur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>

    <!-- Logo Glow: Stronger to match "withGlow" prop -->
    <filter id="logoGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="4" result="coloredBlur" />
      <feMerge>
        <feMergeNode in="coloredBlur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <!-- Deep Cosmos Background -->
  <rect width="800" height="250" fill="#090a10" rx="4" />
  
  <!-- Subtle Stars -->
  <g fill="#ffffff" opacity="0.6" filter="url(#starGlow)">
      <circle cx="50" cy="40" r="1" opacity="0.4" />
      <circle cx="120" cy="180" r="1.2" opacity="0.6" />
      <circle cx="300" cy="30" r="0.8" opacity="0.3" />
      <circle cx="550" cy="200" r="1.1" opacity="0.5" />
      <circle cx="700" cy="60" r="0.9" opacity="0.4" />
      <circle cx="750" cy="220" r="1.3" opacity="0.7" />
      <circle cx="400" cy="10" r="0.7" opacity="0.3" />
      <circle cx="20" cy="100" r="1" opacity="0.5" />
      <circle cx="600" cy="130" r="0.8" opacity="0.4" />
      <circle cx="150" cy="80" r="0.5" opacity="0.3" />
      <circle cx="450" cy="230" r="0.5" opacity="0.3" />
      <circle cx="680" cy="150" r="0.5" opacity="0.2" />
  </g>

  <!-- Content Container: Centered -->
  <g transform="translate(160, 75)">
    
    <!-- Logo (Left) -->
    <g transform="translate(0, 0)">
        <g filter="url(#logoGlow)">
            <!-- Main rings -->
            <circle cx="50" cy="50" r="42" stroke="url(#logoExact)" stroke-width="3.5" stroke-linecap="round" fill="none" opacity="1" />
            <!-- Inner atomic rings -->
            <ellipse cx="50" cy="50" rx="38" ry="12" stroke="url(#logoExact)" stroke-width="3" stroke-linecap="round" fill="none" transform="rotate(0 50 50)" opacity="0.9" />
            <ellipse cx="50" cy="50" rx="38" ry="12" stroke="url(#logoExact)" stroke-width="3" stroke-linecap="round" fill="none" transform="rotate(60 50 50)" opacity="0.9" />
            <ellipse cx="50" cy="50" rx="38" ry="12" stroke="url(#logoExact)" stroke-width="3" stroke-linecap="round" fill="none" transform="rotate(120 50 50)" opacity="0.9" />
        </g>
    </g>

    <!-- Text (Right) -->
    <g transform="translate(130, 20)">
        <!-- ETHEREAL -->
        <text x="0" y="32" font-family="'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-weight="900" font-size="54" letter-spacing="0.25em" fill="#ffffff">ETHEREAL</text>
        
        <!-- STUDIO -->
        <text x="2" y="70" font-family="'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-weight="700" font-size="28" letter-spacing="0.55em" fill="url(#textExact)">STUDIO</text>
    </g>
    
  </g>
</svg>
