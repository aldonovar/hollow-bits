<svg width="800" height="250" viewBox="0 0 800 250" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Logo Gradient: Super Robust V5 -->
    <!-- #9333ea (Purple 600) to #e11d48 (Rose 600) -->
    <linearGradient id="gLogo" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#9333ea;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#e11d48;stop-opacity:1" />
    </linearGradient>

    <!-- Text Gradient: Horizontal -->
    <!-- #a855f7 (Purple 500) to #f43f5e (Rose 500) -->
    <linearGradient id="gText" x1="0%" y1="0%" x2="100%" y2="0%">
        <stop offset="0%" style="stop-color:#a855f7;stop-opacity:1" />
        <stop offset="100%" style="stop-color:#f43f5e;stop-opacity:1" />
    </linearGradient>

    <!-- Star Glow Filter -->
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <!-- Deep Cosmos Background -->
  <rect width="800" height="250" fill="#090a10" rx="4" />
  
  <!-- Subtle Stars -->
  <g fill="#ffffff" opacity="0.4">
      <circle cx="50" cy="40" r="1.5" />
      <circle cx="120" cy="180" r="1.2" />
      <circle cx="300" cy="30" r="1.8" />
      <circle cx="550" cy="200" r="1.1" />
      <circle cx="700" cy="60" r="1.4" />
      <circle cx="750" cy="220" r="1.3" />
      <circle cx="400" cy="10" r="0.7" />
      <circle cx="20" cy="100" r="1.6" />
      <circle cx="600" cy="130" r="0.8" />
  </g>

  <!-- Content Container: Centered -->
  <g transform="translate(160, 75)">
    
    <!-- Logo (Left) -->
    <g transform="translate(0, 0)">
        <g filter="url(#glow)">
            <!-- Main rings -->
            <circle cx="50" cy="50" r="42" stroke="url(#gLogo)" stroke-width="3.5" stroke-linecap="round" fill="none" />
            <!-- Inner atomic rings -->
            <ellipse cx="50" cy="50" rx="38" ry="12" stroke="url(#gLogo)" stroke-width="3" stroke-linecap="round" fill="none" opacity="0.9" />
            <ellipse cx="50" cy="50" rx="38" ry="12" stroke="url(#gLogo)" stroke-width="3" stroke-linecap="round" fill="none" transform="rotate(60 50 50)" opacity="0.9" />
            <ellipse cx="50" cy="50" rx="38" ry="12" stroke="url(#gLogo)" stroke-width="3" stroke-linecap="round" fill="none" transform="rotate(120 50 50)" opacity="0.9" />
        </g>
    </g>

    <!-- Text (Right) -->
    <g transform="translate(130, 20)">
        <!-- HOLLOW - White -->
        <text x="0" y="32" font-family="-apple-system, BlinkMacSystemFont, 'Inter', 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-weight="900" font-size="54" letter-spacing="0.25em" fill="#ffffff">HOLLOW</text>
        
        <!-- BITS - Signature -->
        <text x="4" y="76" font-family="'Great Vibes', 'Brush Script MT', cursive" font-weight="400" font-size="52" letter-spacing="0.04em" textLength="220" lengthAdjust="spacingAndGlyphs" fill="url(#gText)">Bits</text>
    </g>
    
  </g>
</svg>
